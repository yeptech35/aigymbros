<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PT Marhaen AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-950 to-black text-gray-100 font-sans antialiased">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- LOGO & HEADER -->
            <div class="text-center mb-12">
                <div class="text-6xl mb-4 animate-bounce">⚡</div>
                <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-2">AIGYMBROS</h1>
                <p class="text-gray-400 text-sm">AI Gym Coach - Diet & Fitness App</p>
            </div>

            <!-- LOGIN CARD -->
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 rounded-3xl border border-gray-700 p-8 shadow-2xl">
                
                <!-- TABS -->
                <div class="flex gap-4 mb-8 bg-gray-900/50 p-1 rounded-xl">
                    <button class="tab-btn flex-1 py-2 px-4 rounded-lg font-semibold transition-all duration-300 active" data-tab="login">
                        <i class="fa-solid fa-sign-in-alt mr-2"></i>Login
                    </button>
                    <button class="tab-btn flex-1 py-2 px-4 rounded-lg font-semibold transition-all duration-300" data-tab="register">
                        <i class="fa-solid fa-user-plus mr-2"></i>Register
                    </button>
                </div>

                <!-- LOGIN TAB -->
                <div id="loginTab" class="tab-content space-y-4">
                    <!-- Google Login -->
                    <button id="googleLoginBtn" class="w-full bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-3 shadow-lg">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Sign in with Google
                    </button>

                    <!-- Divider -->
                    <div class="relative flex items-center gap-4 my-6">
                        <div class="flex-1 border-t border-gray-700"></div>
                        <span class="text-gray-500 text-sm">or</span>
                        <div class="flex-1 border-t border-gray-700"></div>
                    </div>

                    <!-- Email Login -->
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Email</label>
                            <input type="email" id="loginEmail" placeholder="you@example.com" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/30 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Password</label>
                            <input type="password" id="loginPassword" placeholder="••••••••" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/30 transition-all">
                        </div>
                        <button id="emailLoginBtn" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 text-white font-bold py-3 rounded-xl transition-all duration-200 shadow-lg shadow-emerald-500/30">
                            <i class="fa-solid fa-sign-in-alt mr-2"></i>Login
                        </button>
                    </div>

                    <!-- Remember Me -->
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded accent-emerald-500">
                        <span class="text-sm text-gray-400">Remember me</span>
                    </label>
                </div>

                <!-- REGISTER TAB -->
                <div id="registerTab" class="tab-content hidden space-y-4">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Full Name</label>
                            <input type="text" id="registerName" placeholder="Your Name" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/30 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Email</label>
                            <input type="email" id="registerEmail" placeholder="you@example.com" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/30 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Password</label>
                            <input type="password" id="registerPassword" placeholder="••••••••" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/30 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-300 mb-2">Confirm Password</label>
                            <input type="password" id="registerConfirm" placeholder="••••••••" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/30 transition-all">
                        </div>
                        <button id="emailRegisterBtn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 rounded-xl transition-all duration-200 shadow-lg shadow-cyan-500/30">
                            <i class="fa-solid fa-user-plus mr-2"></i>Create Account
                        </button>
                    </div>

                    <p class="text-xs text-gray-500 text-center">
                        By registering, you agree to our Terms of Service and Privacy Policy
                    </p>
                </div>
            </div>

            <!-- FOOTER -->
            <p class="text-center text-gray-500 text-xs mt-8">
                Made with ❤️ by AIGYMBROS Team
            </p>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBmPRONev1f7YSrSmqLG82JDCv8DKmo_ow",
            authDomain: "gymbros-66a9f.firebaseapp.com",
            projectId: "gymbros-66a9f",
            storageBucket: "gymbros-66a9f.firebasestorage.app",
            messagingSenderId: "379916155169",
            appId: "1:379916155169:web:a5cba29b79f3647dbca660",
            measurementId: "G-PLEC79SQU7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Tab Navigation
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');
                
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.add('hidden');
                });
                
                // Remove active class
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('bg-emerald-600', 'text-white');
                    b.classList.add('text-gray-400');
                });
                
                // Show selected tab
                document.getElementById(tabName + 'Tab').classList.remove('hidden');
                btn.classList.remove('text-gray-400');
                btn.classList.add('bg-emerald-600', 'text-white');
            });
        });

        // Google Sign In
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Save user to Firestore
                await db.collection('users').doc(user.uid).set({
                    name: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    createdAt: new Date(),
                    lastLogin: new Date()
                }, { merge: true });
                
                showNotification('Login successful! 🎉', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                showNotification(error.message, 'error');
            }
        });

        // Email Login
        document.getElementById('emailLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showNotification('Please fill all fields', 'error');
                return;
            }
            
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                const user = result.user;
                
                // Update last login
                await db.collection('users').doc(user.uid).update({
                    lastLogin: new Date()
                });
                
                showNotification('Login successful! 🎉', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                showNotification('Login failed: ' + error.message, 'error');
            }
        });

        // Email Register
        document.getElementById('emailRegisterBtn').addEventListener('click', async () => {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            if (!name || !email || !password || !confirm) {
                showNotification('Please fill all fields', 'error');
                return;
            }
            
            if (password !== confirm) {
                showNotification('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                const user = result.user;
                
                // Update profile
                await user.updateProfile({
                    displayName: name
                });
                
                // Save to Firestore
                await db.collection('users').doc(user.uid).set({
                    name: name,
                    email: email,
                    createdAt: new Date(),
                    lastLogin: new Date(),
                    dailyBudget: 20.00,
                    currentWeight: 75.4,
                    targetWeight: 70,
                    streak: 0,
                    totalWorkouts: 0,
                    height: 175,
                    age: 25
                });
                
                showNotification('Account created successfully! 🎉', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                showNotification('Registration failed: ' + error.message, 'error');
            }
        });

        // Check if user already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User already logged in
                window.location.href = 'index.html';
            }
        });

        // Notification Function
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            const bgColor = type === 'success' ? 'from-emerald-600 to-emerald-700' : 'from-red-600 to-red-700';
            notif.className = `fixed top-4 right-4 bg-gradient-to-r ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg z-50 animate-slideUp`;
            notif.textContent = message;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.remove();
            }, 3000);
        }
    </script>
</body>
</html>
